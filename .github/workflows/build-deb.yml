name: Build Debian Packages

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [master]
    paths:
      - 'packaging/debian/**'
      - '.github/workflows/build-deb.yml'
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Allowed to fail until libtriton-jit*.deb is available via one of:
      #   - a `download-artifact` step pulling the deb from the libtriton_jit
      #     packaging PR's CI, OR
      #   - a live FlagOS APT repo serving libtriton-jit-dev, so the wheel
      #     builder can `apt-get install` it instead of needing it staged at
      #     packaging/debian/helpers/local-deps/.
      # Remove `continue-on-error` once one of the above is wired up.
      - name: Build .deb
        continue-on-error: true
        run: bash packaging/debian/helpers/build-flaggems.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flag-gems-amd64-packages
          path: debian-packages/*.deb
          retention-days: 7
