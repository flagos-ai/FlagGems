name: Build RPM Packages

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [master]
    paths:
      - 'packaging/rpm/**'
      - 'src/**'
      - 'include/**'
      - 'lib/**'
      - 'cmake/**'
      - 'conf/**'
      - 'CMakeLists.txt'
      - 'pyproject.toml'
      - 'tools/setup_nvidia.sh'
      - '.github/workflows/build-rpm.yml'
  workflow_dispatch:

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build .rpm
        run: bash packaging/rpm/build-flag-gems-rpm.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flag-gems-amd64-rpm-packages
          path: rpm-packages/*.rpm
          retention-days: 7
