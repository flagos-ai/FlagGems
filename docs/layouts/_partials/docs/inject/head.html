{{ if .Params.useTabulator }}
<link rel="stylesheet" href="{{ "css/tabulator.min.css" | relURL }}">
<style>
  .benchmark-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .benchmark-tabs button {
    padding: 6px 16px;
    border: 1px solid #ccc;
    background: #f5f5f5;
    cursor: pointer;
    border-radius: 4px 4px 0 0;
    font-size: 14px;
  }
  .benchmark-tabs button.active {
    background: #fff;
    border-bottom-color: #fff;
    font-weight: bold;
  }
  .benchmark-panel { display: none; }
  .benchmark-panel.active { display: block; }
  .tabulator .cell-passed { background-color: #e6f4ea; color: #1a7431; }
  .tabulator .cell-failed { background-color: #fce8e6; color: #c5221f; }
  .tabulator .cell-notfound { background-color: #f0f0f0; color: #666; }
  .tabulator .cell-skipped { background-color: #e8f5fa; color: #0277bd; }
  .tabulator .cell-timeout { background-color: #fff3e0; color: #e65100; }
  .tabulator .tabulator-tableholder { overflow-y: scroll !important; }
</style>
{{ end }}
