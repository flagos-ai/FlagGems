flash_attn_varlen_fa3_direct:
  - gen: true
    param_map: &direct_param_map
      META:
        BLOCK_M: block_m
        BLOCK_N: block_n
      num_warps: warps
      num_stages: stages
    block_m: [16]
    block_n: [16, 32]
    warps: [4]
    stages: [1, 2, 3]
  - gen: true
    param_map: *direct_param_map
    block_m: [16]
    block_n: [64, 128]
    warps: [4, 8]
    stages: [1, 2, 3]
  - gen: true
    param_map: *direct_param_map
    block_m: [16]
    block_n: [256]
    warps: [4, 8]
    stages: [3]
  - gen: true
    param_map: *direct_param_map
    block_m: [32, 64, 128]
    block_n: [16, 32]
    warps: [4]
    stages: [2, 3]
  - gen: true
    param_map: *direct_param_map
    block_m: [32, 64, 128]
    block_n: [64, 128]
    warps: [4, 8]
    stages: [2, 3]
  - gen: true
    param_map: *direct_param_map
    block_m: [32, 64, 128]
    block_n: [256]
    warps: [4, 8]
    stages: [3]

